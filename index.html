
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .btn { width: 200px; padding: 15px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; color: white; text-decoration: none; text-align: center; display: block; }
        
        /* Button Colors */
        .fund { background-color: #27ae60; }
        .account { background-color: #2980b9; }
        .pin { background-color: #c0392b; }
        .view { background-color: #f39c12; } /* Added orange color for the View button */
        
        #installBtn { display: none; background: #34495e; margin-top: 20px; }
    </style>
</head>
<body>

    <img src="logo.png" alt="Logo" style="width: 80px; margin-bottom: 20px;">
    
    <a href="vocher.html" class="btn fund">Gift</a>
    <a href="ksend.html" class="btn account">Account</a>
   
    <a href="de.html" class="btn account">withdrawal </a>
     <button id="installBtn" class="btn">Install App</button>

    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // PWA Install Logic
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
